<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的HTML5网站</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:微软雅黑;background:#f5f5f5;}
        header{background:#2c3e50;color:white;padding:20px;text-align:center;}
        nav{background:#34495e;padding:15px;text-align:center;}
        nav a{color:white;margin:0 15px;text-decoration:none;}
        .container{max-width:1000px;margin:30px auto;padding:20px;background:white;border-radius:8px;}
        footer{background:#2c3e50;color:white;text-align:center;padding:15px;margin-top:30px;}
    </style>
</head>
<body>

<header>
    <h1>我的 HTML5 个人网站</h1>
</header>

<nav>
    <a href="#">首页</a>
    <a href="#">关于我</a>
    <a href="#">作品</a>
    <a href="#">联系</a>
</nav>

<div class="container">
    <h2>欢迎来到我的网站</h2>
    <br>
    <p>这是一个纯 HTML5 做的网站，不需要数据库，不需要后端，打开就能用。</p>
    <br>
    <p>你可以在这里写：介绍、文章、图片、联系方式等。</p>
</div>

<footer>
    © 2026 我的网站 - 纯HTML5搭建
</footer>

</body>
</html>
